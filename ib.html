<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>IB list | IKEA Business</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f4f4f4;color:#111;min-height:100vh}

.topbar{background:#0058A3;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.logo{background:#FFDA1A;color:#0058A3;font-weight:900;font-size:15px;padding:3px 7px;border-radius:3px;white-space:nowrap}
.topbar h1{font-size:17px;font-weight:700;line-height:1.2}
.topbar small{font-size:11px;opacity:.75;display:block}
.status-bar{background:#E8F0FA;border-bottom:1px solid #C5D8F0;padding:6px 16px;font-size:11px;color:#444;display:flex;align-items:center;gap:6px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0}
.status-dot.ok{background:#00853E}
.status-dot.err{background:#E00751}
.status-dot.loading{background:#FFDA1A;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.page{max-width:900px;margin:0 auto;padding:16px}

.card{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.07);padding:18px;margin-bottom:16px}
.card-title{font-size:14px;font-weight:700;color:#0058A3;margin-bottom:14px;padding-bottom:8px;border-bottom:3px solid #FFDA1A;display:flex;align-items:center;gap:6px}

/* Input */
.input-wrap{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start}
#article-input{flex:1;min-width:180px;padding:10px 12px;border:2px solid #ddd;border-radius:8px;font-size:14px;font-family:monospace;resize:vertical;min-height:90px;transition:border .2s}
#article-input:focus{outline:none;border-color:#0058A3}
.btn-col{display:flex;flex-direction:column;gap:8px}

.btn{padding:10px 18px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:6px;justify-content:center}
.btn:active{transform:scale(.97)}
.btn-blue{background:#0058A3;color:#fff}.btn-blue:hover{background:#004A8F}
.btn-green{background:#00853E;color:#fff}.btn-green:hover{background:#006B31}
.btn-yellow{background:#FFDA1A;color:#111}.btn-yellow:hover{background:#F0C800}
.btn-red{background:#E00751;color:#fff}.btn-red:hover{background:#B8053F}
.btn-sm{padding:7px 14px;font-size:13px}

/* Scanner */
#scanner-wrap{display:none;margin-top:14px;text-align:center}
#reader{width:100%;max-width:380px;margin:0 auto;border-radius:8px;overflow:hidden}

/* Alerts */
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin:8px 0;line-height:1.5}
.alert-warn{background:#FFF8E1;border-left:4px solid #FFDA1A;color:#7A5800}
.alert-danger{background:#FFF0F3;border-left:4px solid #E00751;color:#7A0028}
.alert-ok{background:#E8F5ED;border-left:4px solid #00853E;color:#00512A}
.alert-info{background:#E8F0FA;border-left:4px solid #0058A3;color:#00357A}

/* Table */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px;border:1px solid #C5D3E8}
thead th{background:#0058A3;color:#fff;padding:9px 10px;text-align:left;white-space:nowrap;font-weight:600;position:sticky;top:0}
thead th:first-child{border-radius:6px 0 0 0}
thead th:last-child{border-radius:0 6px 0 0}
tbody tr:nth-child(odd){background:#F4F7FB}
tbody tr:nth-child(even){background:#fff}
tbody tr:hover{background:#EDF3FB}
tbody td{padding:9px 10px;vertical-align:middle;border-bottom:1px solid #d0d8e8;border-top:1px solid #d0d8e8}
.artno{font-family:monospace;font-size:12px;font-weight:700;color:#0058A3}
.hfb-badge{background:#0058A3;color:#fff;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;margin:1px}
.tag-ssd{background:#FFF8E1;color:#7A5800}
.tag-eds{background:#FFF0F3;color:#7A0028}
.tag-rto{background:#E8F5ED;color:#00512A}
.tag-none{color:#bbb;font-size:12px}
.num{text-align:right;font-variant-numeric:tabular-nums}

/* Qty input */
.qty-cell{min-width:100px}
.qty-input{width:90px;padding:6px 8px;border:2px solid #ddd;border-radius:6px;font-size:13px;text-align:center;transition:border .2s}
.qty-input:focus{outline:none;border-color:#0058A3}

/* FC comparison cell */
.fc-cell{min-width:130px}
.fc-pending{color:#aaa;font-size:12px}
.fc-ok-label{color:#00853E;font-weight:700;font-size:13px}
.fc-warn-label{color:#E00751;font-weight:700;font-size:13px}
.fc-sub{font-size:11px;color:#888;margin-top:2px}

/* Submit form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:520px){.form-grid{grid-template-columns:1fr}}
.fg label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:4px}
.fg input,.fg textarea{width:100%;padding:9px 12px;border:2px solid #ddd;border-radius:7px;font-size:14px;transition:border .2s}
.fg input:focus,.fg textarea:focus{outline:none;border-color:#0058A3}
.fg.full{grid-column:1/-1}
.submit-items{background:#F9FAFB;border-radius:8px;padding:12px;font-size:13px;max-height:180px;overflow-y:auto;margin:8px 0}
.submit-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #eee}
.submit-item:last-child{border-bottom:none}
.si-artno{font-family:monospace;font-weight:700;color:#0058A3;width:90px;flex-shrink:0}
.si-name{flex:1;color:#555}
.si-qty{font-weight:700;color:#111;white-space:nowrap}
.si-warn{color:#E00751;font-size:11px}

/* Divider */
.divider{border:none;border-top:1px solid #eee;margin:16px 0}

/* QR section */
.qr-box{text-align:center;padding:12px 0}
#qrcode{display:inline-block;padding:12px;background:#fff;border:1px solid #ddd;border-radius:8px;margin-bottom:8px}
.qr-url{font-size:12px;color:#666;word-break:break-all;max-width:300px;margin:0 auto}

/* Not found row */
.row-notfound td{color:#E00751;font-style:italic}

/* Responsive */
@media(max-width:600px){
  .topbar h1{font-size:15px}
  .card{padding:14px}
  .btn{padding:9px 14px;font-size:13px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">IKEA</div>
  <div>
    <h1>IB list</h1>
    <small>Availability &amp; FC Enquiry for IKEA Business</small>
  </div>
</div>

<div class="status-bar">
  <div class="status-dot loading" id="sdot"></div>
  <span id="stext">数据加载中…</span>
  <button onclick="loadData(true)" style="margin-left:auto;background:none;border:1px solid #9ab;border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer;color:#555;white-space:nowrap">🔄 刷新数据</button>
</div>

<div class="page">

  <!-- 输入区 -->
  <div class="card">
    <div class="card-title">📦 输入货号</div>
    <div class="input-wrap">
      <textarea id="article-input" placeholder="输入货号，支持批量（每行一个）&#10;支持「货号 数量」两列格式，数量自动填入&#10;例如：&#10;80415595    5&#10;40387486    6&#10;60503296"></textarea>
      <div class="btn-col">
        <button class="btn btn-blue" onclick="doSearch()">🔍 查询</button>
        <button class="btn btn-green" id="scan-btn" onclick="toggleScanner()">📷 扫码</button>
        <button class="btn btn-yellow btn-sm" onclick="clearAll()">🗑 清除</button>
      </div>
    </div>
    <div id="scanner-wrap">
      <div id="reader"></div>
      <button class="btn btn-red btn-sm" style="margin-top:10px" onclick="stopScanner()">■ 停止扫码</button>
    </div>
  </div>

  <!-- 结果区 -->
  <div class="card" id="result-card" style="display:none">
    <div class="card-title">📊 产品信息</div>
    <div class="alert alert-info" id="fc-note"></div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>HFB</th>
            <th>货号</th>
            <th>中文名称</th>
            <th>Remark</th>
            <th class="num">AVA<br><small style="font-weight:400;opacity:.8">可用库存</small></th>
            <th>需求数量</th>
            <th class="num">在途总量</th>
            <th class="num">下次到货</th>
            <th class="num">LT<br><small style="font-weight:400;opacity:.8">周</small></th>
            <th class="num">AWS<br><small style="font-weight:400;opacity:.8">周均销</small></th>
            <th class="num">EWS<br><small style="font-weight:400;opacity:.8">预期周销</small></th>
            <th>CN Rate%</th>
            <th class="num">当月FC</th>
          </tr>
        </thead>
        <tbody id="result-body"></tbody>
      </table>
    </div>

    <!-- 汇总警告 -->
    <div id="warn-box" style="margin-top:14px"></div>

    <hr class="divider">

    <!-- 提交需求 -->
    <div class="card-title">📬 提交采购需求至 FIS 团队</div>
    <div class="form-grid" style="margin-top:8px">
      <div class="fg">
        <label>客户公司名称 *</label>
        <input type="text" id="f-company" placeholder="公司名称">
      </div>
      <div class="fg">
        <label>需求时间 *</label>
        <input type="date" id="f-reqdate">
      </div>
      <div class="fg full">
        <label>备注（如项目背景、配送要求等）</label>
        <textarea id="f-notes" rows="2" placeholder="可选"></textarea>
      </div>
    </div>
    <button class="btn btn-blue" style="margin-top:14px;width:100%;max-width:220px" onclick="submitRequest()">
      📤 提交至 FIS 团队
    </button>
    <div id="submit-confirm" style="margin-top:10px"></div>
  </div>

  <!-- 分享二维码 -->
  <div class="card">
    <div class="card-title">📱 分享此页面</div>
    <div class="qr-box">
      <div id="qrcode"></div>
      <div class="qr-url" id="qr-url-text"></div>
      <div style="font-size:12px;color:#888;margin-top:6px">微信扫码直接使用，无需安装</div>
    </div>
  </div>

</div><!-- /page -->

<script>
// ═══════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════
let DATA = null;  // { products:{}, fc_weekly:{}, updated:"" }
let RESULTS = []; // [{art, product, fcResult}]

// ── findProduct: tries all common paddings ──
function findProduct(artRaw) {
  const prods = DATA.products || {};
  if (prods[artRaw]) return prods[artRaw];
  for (let len = 4; len <= 10; len++) {
    const k = artRaw.padStart(len, '0');
    if (prods[k]) return prods[k];
  }
  const bare = artRaw.replace(/^0+/, '');
  if (bare && prods[bare]) return prods[bare];
  return null;
}
let scanner = null;

// ═══════════════════════════════════════════════════════
// Load data
// ═══════════════════════════════════════════════════════
const CACHE_KEY = 'ib_data_cache';
const CACHE_TS_KEY = 'ib_data_ts';
const CACHE_TTL_MS = 55 * 60 * 1000; // 55 minutes

async function loadData(forceRefresh) {
  setStatus('loading', '数据加载中…');
  try {
    // Try localStorage cache first
    if (!forceRefresh) {
      const ts = parseInt(localStorage.getItem(CACHE_TS_KEY) || '0');
      if (Date.now() - ts < CACHE_TTL_MS) {
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
          DATA = JSON.parse(cached);
          const n = Object.keys(DATA.products || {}).length;
          setStatus('ok', `数据已就绪 · ${n} 个产品 · 更新于 ${DATA.updated || '未知'} （缓存）`);
          return;
        }
      }
    }
    // Fetch fresh data
    const r = await fetch('ib-data.json?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    DATA = await r.json();
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify(DATA));
      localStorage.setItem(CACHE_TS_KEY, Date.now().toString());
    } catch(e) { /* storage full, ignore */ }
    const n = Object.keys(DATA.products || {}).length;
    setStatus('ok', `数据已就绪 · ${n} 个产品 · 更新于 ${DATA.updated || '未知'}`);
  } catch (e) {
    // Try stale cache as fallback
    try {
      const cached = localStorage.getItem(CACHE_KEY);
      if (cached) {
        DATA = JSON.parse(cached);
        const n = Object.keys(DATA.products || {}).length;
        setStatus('ok', `⚠️ 网络失败，使用缓存 · ${n} 个产品 · 更新于 ${DATA.updated || '未知'}`);
        return;
      }
    } catch(e2) {}
    setStatus('err', '数据加载失败：' + e.message + '（请联系 IB 团队更新数据）');
    DATA = { products: {}, fc_weekly: {}, updated: '' };
  }
}

function setStatus(state, text) {
  document.getElementById('sdot').className = 'status-dot ' + state;
  document.getElementById('stext').textContent = text;
}

// ═══════════════════════════════════════════════════════
// ISO Week → Date utilities
// ═══════════════════════════════════════════════════════
function isoWeekMonday(year, week) {
  // Returns UTC Date of Monday for ISO week
  const jan4 = Date.UTC(year, 0, 4);
  const jan4dow = new Date(jan4).getUTCDay() || 7; // Mon=1..Sun=7
  const week1Mon = jan4 - (jan4dow - 1) * 86400000;
  return new Date(week1Mon + (week - 1) * 7 * 86400000);
}

function currentMonthFC(artno) {
  if (!DATA || !DATA.fc_weekly) return null;
  const fc = DATA.fc_weekly[artno] || DATA.fc_weekly[artno.replace(/^0+/, '')];
  if (!fc) return null;

  // Current ISO week
  const now = new Date();
  const jan4 = Date.UTC(now.getFullYear(), 0, 4);
  const jan4dow = new Date(jan4).getUTCDay() || 7;
  const week1Mon = jan4 - (jan4dow - 1) * 86400000;
  const curWk = Math.ceil((now - week1Mon) / (7 * 86400000)) + 1;
  const curYr = now.getFullYear();

  // Build target set: current week and 3 weeks back (4 weeks total)
  const targets = new Set();
  for (let i = 0; i < 4; i++) {
    let wk = curWk - i;
    let yr = curYr;
    if (wk <= 0) { yr -= 1; wk += 52; }
    targets.add(`${yr}${String(wk).padStart(2,'0')}`);
  }

  let total = 0, count = 0;
  for (const [wk, val] of Object.entries(fc)) {
    if (targets.has(wk)) {
      total += parseFloat(val) || 0;
      count++;
    }
  }
  return count > 0 ? { total: Math.round(total), weeks: count } : null;
}

// ═══════════════════════════════════════════════════════
// Scanner
// ═══════════════════════════════════════════════════════
function toggleScanner() {
  const wrap = document.getElementById('scanner-wrap');
  if (wrap.style.display === 'none' || !wrap.style.display) {
    wrap.style.display = 'block';
    startScanner();
  } else {
    stopScanner();
  }
}

function startScanner() {
  if (!scanner) scanner = new Html5Qrcode('reader');
  Html5Qrcode.getCameras().then(cams => {
    if (!cams.length) { alert('未找到摄像头'); return; }
    const cam = cams.find(c => /back|rear|后/i.test(c.label)) || cams[cams.length - 1];
    scanner.start(cam.id, { fps: 10, qrbox: { width: 260, height: 120 } },
      text => {
        const m = text.match(/\d{8}/);
        if (m) addArticle(m[0]);
      }, null
    ).catch(e => alert('摄像头启动失败：' + e));
  }).catch(e => alert('获取摄像头失败：' + e));
}

function stopScanner() {
  const wrap = document.getElementById('scanner-wrap');
  wrap.style.display = 'none';
  if (scanner) {
    scanner.stop().catch(() => {});
    scanner = null;
  }
  document.getElementById('scan-btn').textContent = '📷 扫码';
}

function addArticle(artno) {
  const ta = document.getElementById('article-input');
  const lines = ta.value.trim() ? ta.value.trim().split('\n').map(l => l.trim()) : [];
  if (!lines.includes(artno)) {
    ta.value = (ta.value.trim() ? ta.value.trim() + '\n' : '') + artno;
  }
  const btn = document.getElementById('scan-btn');
  btn.textContent = '✅ ' + artno;
  setTimeout(() => btn.textContent = '📷 扫码', 1800);
}

// ═══════════════════════════════════════════════════════
// Search
// ═══════════════════════════════════════════════════════
function parseInput(raw) {
  // Extracts first number (7-10 digits = article) and optional second number (qty)
  // Handles any separator: single/multiple spaces, tab, comma, slash, etc.
  const lines = raw.split(/\n/).map(l => l.trim()).filter(l => l);
  const seen = new Set();
  const items = [];
  for (const line of lines) {
    const nums = line.match(/\d+/g) || [];
    if (!nums.length) continue;
    // First number sequence with 6-10 digits = article number
    const artRaw = nums[0];
    if (artRaw.length < 4 || artRaw.length > 10) continue;
    const art = artRaw.padStart(8, '0');
    if (art.length !== 8 || seen.has(art)) continue;
    seen.add(art);
    // Second number = quantity (if present and reasonable value < 1,000,000)
    let qty = null;
    if (nums.length > 1) {
      const qv = parseFloat(nums[1]);
      if (!isNaN(qv) && qv > 0 && qv < 1000000) qty = qv;
    }
    items.push({ art, qty });
  }
  return items;
}

function doSearch() {
  const raw = document.getElementById('article-input').value.trim();
  if (!raw) { alert('请输入货号'); return; }

  const items = parseInput(raw);
  if (!items.length) { alert('未识别到有效货号（4-10位数字）'); return; }

  stopScanner();

  const now = new Date();
  const MONTHS = ['一','二','三','四','五','六','七','八','九','十','十一','十二'];
  document.getElementById('fc-note').textContent =
    `📅 月度FC参考月份：${now.getFullYear()}年${MONTHS[now.getMonth()]}月（当月各周FC合计）`;

  const tbody = document.getElementById('result-body');
  tbody.innerHTML = '';
  RESULTS = [];

  items.forEach(({ art, qty: presetQty }) => {
    const prod = findProduct(art);
    const fc = currentMonthFC(art);
    RESULTS.push({ art, prod, fc });

    const tr = document.createElement('tr');
    if (!prod) {
      tr.className = 'row-notfound';
      tr.innerHTML = `<td colspan="13" style="padding:10px 12px">
        ⚠️ 货号 <strong>${art}</strong> 未找到（请确认货号，或联系 IB 团队）</td>`;
    } else {
      const hfb = prod.hfb || art.slice(0, 2);
      const name = prod.name || '—';
      const aws = prod.aws != null ? Math.round(prod.aws * 10) / 10 : '—';
      const ews = prod.ews != null ? Math.round(prod.ews * 10) / 10 : '—';
      const ava = prod.ava != null ? Math.round(prod.ava) : '—';
      const lt = prod.lt != null ? prod.lt : '—';
      const inway = prod.in_transit != null ? prod.in_transit.toLocaleString() : '—';
      const nxdel = prod.next_delivery != null ? prod.next_delivery.toLocaleString() : '—';
      const nxdate = prod.next_delivery_date ? `<div style="font-size:11px;color:#888">${prod.next_delivery_date}</div>` : '';
      const rto = prod.rto ? `<span class="tag tag-rto">RTO: ${prod.rto}</span>` : `<span class="tag-none">—</span>`;
      const ssd = prod.ssd ? `<span class="tag tag-ssd">${prod.ssd}</span>` : `<span class="tag-none">—</span>`;
      const eds = prod.eds ? `<span class="tag tag-eds">${prod.eds}</span>` : `<span class="tag-none">—</span>`;
      const fcDisp = fc ? `<strong>${fc.total.toLocaleString()}</strong><div style="font-size:11px;color:#888">${fc.weeks}周合计</div>` : '<span class="tag-none">无数据</span>';

      tr.innerHTML = `
        <td><span class="hfb-badge">${hfb}</span></td>
        <td class="artno">${art}</td>
        <td>${name}</td>
        <td class="fc-cell" id="rmk-${art}">
          <span class="fc-pending">—</span>
        </td>
        <td class="num">${ava}</td>
        <td class="qty-cell">
          <input type="number" class="qty-input" min="0" placeholder="数量"
            data-art="${art}" data-fc="${fc ? fc.total : ''}"
            oninput="onQtyChange(this)">
        </td>
        <td class="num">${inway}</td>
        <td class="num">${nxdel}${nxdate}</td>
        <td class="num">${lt}</td>
        <td class="num">${aws}</td>
        <td class="num">${ews}</td>
        <td class="fc-cell" id="fcc-${art}">
          <span class="fc-pending">填写数量后显示</span>
        </td>
        <td class="num">${fcDisp}</td>`;
    }
    tbody.appendChild(tr);

    // Pre-fill qty if provided in input
    if (presetQty != null) {
      const inp = tr.querySelector('.qty-input');
      if (inp) {
        inp.value = presetQty;
        onQtyChange(inp);
      }
    }
  });

  document.getElementById('result-card').style.display = 'block';
  document.getElementById('result-card').scrollIntoView({ behavior: 'smooth' });
  refreshWarnBox();
}

// ═══════════════════════════════════════════════════════
// Remark logic
// ═══════════════════════════════════════════════════════
function calcRemark(prod, qty, fc) {
  if (!prod || isNaN(qty) || qty <= 0) return '';
  const ava    = prod.ava    != null ? prod.ava    : 0;
  const onway  = prod.in_transit != null ? prod.in_transit : 0;
  const ews    = prod.ews    != null ? prod.ews    : 0;
  const lt     = prod.lt     != null ? prod.lt     : 0;
  const ewsLT  = ews * lt;
  const monthlyFC = fc ? fc.total : null;
  const exceedsFC = monthlyFC && qty > monthlyFC * 1.1;

  if (exceedsFC) {
    if (ava < qty) {
      return '<span style="color:#E00751;font-weight:700">⚠️ 咨询SO</span>';
    } else {
      return (ava - qty) - ewsLT > 1
        ? '<span style="color:#00853E;font-weight:700">✅ 直接拿货</span>'
        : '<span style="color:#7A5800;font-weight:700">🔍 单独找HFB看</span>';
    }
  } else {
    if (ava - qty + onway > ewsLT) {
      return ava >= qty
        ? '<span style="color:#00853E;font-weight:700">✅ 直接拿货</span>'
        : '<span style="color:#0058A3;font-weight:700">⏳ 等到货</span>';
    } else {
      return '<span style="color:#7A0096;font-weight:700">📦 额外订货</span>';
    }
  }
}

function updateAutoDeliveryDate() {
  // Find max LT among items that need ordering/SO consultation
  let maxLT = 0;
  document.querySelectorAll('.qty-input').forEach(inp => {
    const qty = parseFloat(inp.value);
    if (isNaN(qty) || qty <= 0) return;
    const art = inp.dataset.art;
    const res = RESULTS.find(r => r.art === art);
    if (!res || !res.prod) return;
    const remark = calcRemark(res.prod, qty, res.fc);
    // Items that need lead time: SO / 等到货 / 额外订货
    if (remark.includes('咨询SO') || remark.includes('等到货') || remark.includes('额外订货')) {
      const lt = res.prod.lt || 0;
      if (lt > maxLT) maxLT = lt;
    }
  });
  const el = document.getElementById('f-reqdate');
  if (!el) return;
  if (maxLT > 0) {
    const minDate = new Date();
    minDate.setDate(minDate.getDate() + Math.ceil(maxLT * 7));
    const iso = minDate.toISOString().slice(0, 10);
    el.min = iso;
    if (!el.value || el.value < iso) el.value = iso;
  } else {
    el.min = new Date().toISOString().slice(0, 10);
  }
}


function onQtyChange(input) {
  const art = input.dataset.art;
  const fc = parseFloat(input.dataset.fc);
  const qty = parseFloat(input.value);
  const cell = document.getElementById('fcc-' + art);
  const rmkCell = document.getElementById('rmk-' + art);
  if (!cell) return;

  const res = RESULTS.find(r => r.art === art);
  const prod = res ? res.prod : null;
  const fcResult = res ? res.fc : null;

  if (isNaN(qty) || qty <= 0) {
    cell.innerHTML = '<span class="fc-pending">填写数量后显示</span>';
    if (rmkCell) rmkCell.innerHTML = '<span class="fc-pending">—</span>';
  } else if (isNaN(fc) || fc <= 0) {
    cell.innerHTML = '<span class="fc-pending">无FC数据</span>';
    if (rmkCell && prod) rmkCell.innerHTML = calcRemark(prod, qty, null);
  } else {
    const ratio = qty / fc;
    const pct = Math.round((ratio - 1) * 100);
    if (ratio > 1.1) {
      cell.innerHTML = `<div class="fc-warn-label">⚠️ 超FC +${pct}%</div>`;
    } else if (ratio >= 0.9) {
      cell.innerHTML = `<div class="fc-ok-label">✅ 正常</div>`;
    } else {
      cell.innerHTML = `<div style="color:#0058A3;font-weight:700">${Math.round(ratio*100)}%</div>`;
    }
    if (rmkCell && prod) rmkCell.innerHTML = calcRemark(prod, qty, fcResult);
  }
  refreshWarnBox();
  updateAutoDeliveryDate();
}

function refreshWarnBox() {
  const warns = [];
  document.querySelectorAll('.qty-input').forEach(inp => {
    const qty = parseFloat(inp.value);
    const fc = parseFloat(inp.dataset.fc);
    if (isNaN(qty) || qty <= 0 || isNaN(fc) || fc <= 0) return;
    if (qty / fc > 1.1) {
      const art = inp.dataset.art;
      const res = RESULTS.find(r => r.art === art);
      const name = res && res.prod ? res.prod.name || art : art;
      const pct = Math.round((qty / fc - 1) * 100);
      warns.push(`货号 <strong>${art}</strong> ${name}：需求 ${qty.toLocaleString()} 件，超月度FC <strong>+${pct}%</strong>`);
    }
  });
  const box = document.getElementById('warn-box');
  if (warns.length) {
    box.innerHTML = `<div class="alert alert-warn">
      <div style="font-weight:700;margin-bottom:6px">⚠️ 以下货号需求超月度FC 10%，请联系 SO 确认供货能力：</div>
      <ul style="padding-left:18px">${warns.map(w => `<li style="margin:4px 0">${w}</li>`).join('')}</ul>
    </div>`;
  } else {
    box.innerHTML = '';
  }
}

function getSubmitItems() {
  const items = [];
  document.querySelectorAll('.qty-input').forEach(inp => {
    const qty = parseFloat(inp.value);
    if (isNaN(qty) || qty <= 0) return;
    const art = inp.dataset.art;
    const fc = parseFloat(inp.dataset.fc);
    const res = RESULTS.find(r => r.art === art);
    const prod = res ? res.prod : null;
    const name = prod ? prod.name || '' : '';
    const hfb  = prod ? (prod.hfb || art.slice(0,2)) : '';
    const ava  = prod && prod.ava != null ? Math.round(prod.ava) : '—';
    const inway  = prod && prod.in_transit != null ? prod.in_transit.toLocaleString() : '—';
    const nxdate = prod ? (prod.next_delivery_date || '—') : '—';
    const lt   = prod && prod.lt != null ? prod.lt : '—';
    const aws  = prod && prod.aws != null ? (Math.round(prod.aws*10)/10) : '—';
    const ews  = prod && prod.ews != null ? (Math.round(prod.ews*10)/10) : '—';
    const overFC = !isNaN(fc) && fc > 0 && qty / fc > 1.1;
    const overFCPct = overFC ? Math.round((qty / fc - 1) * 100) : 0;
    const rmkCell = document.getElementById('rmk-' + art);
    const remark = rmkCell ? rmkCell.textContent.trim() : '';
    const fccCell = document.getElementById('fcc-' + art);
    const fcCompare = fccCell ? fccCell.textContent.trim() : '';
    items.push({ art, name, hfb, qty, overFC, overFCPct, fc, ava, inway, nxdate, lt, aws, ews, remark, fcCompare });
  });
  return items;
}

// ═══════════════════════════════════════════════════════
// Submit — EmailJS direct send
// Fill in your EmailJS credentials below (one-time setup at emailjs.com)
// ═══════════════════════════════════════════════════════
const EMAILJS_PUBLIC_KEY  = 'YOUR_PUBLIC_KEY';   // Account > Public Key
const EMAILJS_SERVICE_ID  = 'YOUR_SERVICE_ID';   // Email Services > Service ID
const EMAILJS_TEMPLATE_ID = 'YOUR_TEMPLATE_ID';  // Email Templates > Template ID

function buildEmailHtml(company, reqdateCN, items, notes, dateStr) {
  const tdStyle = 'padding:6px 10px;border:1px solid #ddd;font-size:12px';
  const thStyle = 'padding:7px 10px;background:#0058A3;color:#fff;font-size:12px;text-align:left;border:1px solid #0047A0';
  const rows = items.map(it => {
    const fcWarn = it.overFC ? ` <span style="color:#E00751;font-weight:700">⚠️超FC+${it.overFCPct}%</span>` : '';
    return `<tr>
      <td style="${tdStyle}">${it.hfb}</td>
      <td style="${tdStyle};font-family:monospace;font-weight:700;color:#0058A3">${it.art}</td>
      <td style="${tdStyle}">${it.name}</td>
      <td style="${tdStyle}">${it.remark}</td>
      <td style="${tdStyle};text-align:right">${it.ava}</td>
      <td style="${tdStyle};text-align:right;font-weight:700">${it.qty.toLocaleString()}</td>
      <td style="${tdStyle};text-align:right">${it.inway}</td>
      <td style="${tdStyle};text-align:center">${it.nxdate}</td>
      <td style="${tdStyle};text-align:right">${it.lt}</td>
      <td style="${tdStyle};text-align:right">${it.aws}</td>
      <td style="${tdStyle};text-align:right">${it.ews}</td>
      <td style="${tdStyle}">${it.fcCompare}${fcWarn}</td>
      <td style="${tdStyle};text-align:right">${it.fc > 0 ? it.fc.toLocaleString() : '—'}</td>
    </tr>`;
  }).join('');
  return `<div style="font-family:Arial,Helvetica,sans-serif;font-size:13px;color:#111">
  <h2 style="color:#0058A3;font-size:15px;margin:0 0 12px">📦 IB 采购需求 — FIS 团队</h2>
  <table style="border-collapse:collapse;margin-bottom:14px">
    <tr><td style="padding:3px 14px 3px 0;font-weight:700;color:#444">客户公司</td><td style="font-weight:700">${company}</td></tr>
    <tr><td style="padding:3px 14px 3px 0;font-weight:700;color:#444">需求时间</td><td>${reqdateCN}</td></tr>
    <tr><td style="padding:3px 14px 3px 0;font-weight:700;color:#444">提交时间</td><td style="color:#888">${dateStr}</td></tr>
  </table>
  <table style="border-collapse:collapse;min-width:700px">
    <thead><tr>
      <th style="${thStyle}">HFB</th>
      <th style="${thStyle}">货号</th>
      <th style="${thStyle}">中文名称</th>
      <th style="${thStyle}">Remark</th>
      <th style="${thStyle}">AVA</th>
      <th style="${thStyle}">需求数量</th>
      <th style="${thStyle}">在途</th>
      <th style="${thStyle}">下次到货</th>
      <th style="${thStyle}">LT(周)</th>
      <th style="${thStyle}">AWS</th>
      <th style="${thStyle}">EWS</th>
      <th style="${thStyle}">CN Rate%</th>
      <th style="${thStyle}">当月FC</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>
  ${notes ? `<p style="margin-top:12px"><b>备注：</b>${notes}</p>` : ''}
</div>`;
}

async function submitRequest() {
  const company = document.getElementById('f-company').value.trim();
  const reqdate = document.getElementById('f-reqdate').value.trim();
  if (!company) { alert('请填写客户公司名称'); return; }
  if (!reqdate) { alert('请填写需求时间'); return; }

  const items = getSubmitItems();
  if (!items.length) { alert('请至少为一个货号填写需求数量'); return; }

  const now = new Date();
  const dateStr = now.toLocaleString('zh-CN', { hour12: false });
  const notes = document.getElementById('f-notes').value.trim();
  const rd = new Date(reqdate + 'T00:00:00');
  const reqdateCN = `${rd.getFullYear()}年${rd.getMonth()+1}月${rd.getDate()}日`;
  const subject = `IB采购需求 - ${company} - 需求时间${reqdateCN}`;
  const htmlBody = buildEmailHtml(company, reqdateCN, items, notes, dateStr);

  const confirmEl = document.getElementById('submit-confirm');

  confirmEl.innerHTML = `<div class="alert alert-info">📤 尝试本地发送…</div>`;

  // ── 优先尝试本地 API（IB Email Server on localhost:5003）──
  let localSendOk = false;
  let localError = '';
  try {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 8000);
    const resp = await fetch('http://localhost:5003/send_ib_email', {
      method: 'POST',
      mode: 'cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ subject, html_body: htmlBody }),
      signal: ctrl.signal,
    });
    clearTimeout(tid);
    const result = await resp.json();
    if (resp.ok && result.status === 'ok') {
      localSendOk = true;
    } else {
      localError = result.message || '本地服务返回错误';
    }
  } catch (e) {
    localError = e.message || String(e);
  }

  if (localSendOk) {
    confirmEl.innerHTML = `<div class="alert alert-ok">✅ 邮件已直接发送至 hattie.wang@ingka.ikea.com</div>`;
    return;
  }

  if (EMAILJS_PUBLIC_KEY !== 'YOUR_PUBLIC_KEY') {
    try {
      emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
        to_email: 'hattie.wang@ingka.ikea.com',
        subject,
        html_body: htmlBody,
        company,
        reqdate: reqdateCN,
      });
      confirmEl.innerHTML = `<div class="alert alert-ok">✅ 邮件已直接发送至 hattie.wang@ingka.ikea.com</div>`;
      return;
    } catch (err) {
      const msg = (err && (err.text || err.message)) || JSON.stringify(err);
      confirmEl.innerHTML = `<div class="alert alert-danger">❌ 发送失败：${msg}</div>`;
      return;
    }
  }

  // ── 最终降级：复制剪贴板 + 打开 Outlook 草稿 ──
  // 显示本地API失败原因，方便排查
  const dbgInfo = localError ? `<div style="font-size:11px;color:#999;margin-top:4px">本地API: ${localError}</div>` : '';
  let clipOk = false;
  try {
    const blob = new Blob([htmlBody], { type: 'text/html' });
    await navigator.clipboard.write([new ClipboardItem({ 'text/html': blob })]);
    clipOk = true;
  } catch (e) { /* clipboard denied */ }
  const mailtoUrl = `mailto:hattie.wang@ingka.ikea.com?subject=${encodeURIComponent(subject)}`;
  window.location.href = mailtoUrl;
  if (clipOk) {
    confirmEl.innerHTML = `<div class="alert alert-warn">
      ⚠️ 本地发送服务未运行，Outlook 草稿已打开。<br>
      HTML 表格已复制到剪贴板，在正文区按 <strong>Ctrl+V</strong> 粘贴后发送。${dbgInfo}
    </div>`;
  } else {
    confirmEl.innerHTML = `<div class="alert alert-warn">
      ⚠️ 本地发送服务未运行，Outlook 草稿已打开（纯文本）。<br>
      如需表格格式，请点击下方按钮复制后粘贴。
      <div style="margin-top:8px">
        <button class="btn btn-blue btn-sm" onclick="manualCopyHtml()">📋 复制 HTML 表格</button>
      </div>
    </div>`;
    window._lastHtmlBody = htmlBody;
  }
}

// ── Manual HTML copy fallback ──
async function manualCopyHtml() {
  const h = window._lastHtmlBody || '';
  if (!h) return;
  try {
    const blob = new Blob([h], { type: 'text/html' });
    await navigator.clipboard.write([new ClipboardItem({ 'text/html': blob })]);
    alert('✅ 已复制！请在 Outlook 正文粘贴 Ctrl+V');
  } catch (e) {
    alert('复制失败，请手动复制：' + e.message);
  }
}
