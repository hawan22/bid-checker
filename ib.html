<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>IB 产品查询 | IKEA Business</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f4f4f4;color:#111;min-height:100vh}

.topbar{background:#0058A3;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.logo{background:#FFDA1A;color:#0058A3;font-weight:900;font-size:15px;padding:3px 7px;border-radius:3px;white-space:nowrap}
.topbar h1{font-size:17px;font-weight:700;line-height:1.2}
.topbar small{font-size:11px;opacity:.75;display:block}
.status-bar{background:#E8F0FA;border-bottom:1px solid #C5D8F0;padding:6px 16px;font-size:11px;color:#444;display:flex;align-items:center;gap:6px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0}
.status-dot.ok{background:#00853E}
.status-dot.err{background:#E00751}
.status-dot.loading{background:#FFDA1A;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.page{max-width:900px;margin:0 auto;padding:16px}

.card{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.07);padding:18px;margin-bottom:16px}
.card-title{font-size:14px;font-weight:700;color:#0058A3;margin-bottom:14px;padding-bottom:8px;border-bottom:3px solid #FFDA1A;display:flex;align-items:center;gap:6px}

/* Input */
.input-wrap{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start}
#article-input{flex:1;min-width:180px;padding:10px 12px;border:2px solid #ddd;border-radius:8px;font-size:14px;font-family:monospace;resize:vertical;min-height:90px;transition:border .2s}
#article-input:focus{outline:none;border-color:#0058A3}
.btn-col{display:flex;flex-direction:column;gap:8px}

.btn{padding:10px 18px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:6px;justify-content:center}
.btn:active{transform:scale(.97)}
.btn-blue{background:#0058A3;color:#fff}.btn-blue:hover{background:#004A8F}
.btn-green{background:#00853E;color:#fff}.btn-green:hover{background:#006B31}
.btn-yellow{background:#FFDA1A;color:#111}.btn-yellow:hover{background:#F0C800}
.btn-red{background:#E00751;color:#fff}.btn-red:hover{background:#B8053F}
.btn-sm{padding:7px 14px;font-size:13px}

/* Scanner */
#scanner-wrap{display:none;margin-top:14px;text-align:center}
#reader{width:100%;max-width:380px;margin:0 auto;border-radius:8px;overflow:hidden}

/* Alerts */
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin:8px 0;line-height:1.5}
.alert-warn{background:#FFF8E1;border-left:4px solid #FFDA1A;color:#7A5800}
.alert-danger{background:#FFF0F3;border-left:4px solid #E00751;color:#7A0028}
.alert-ok{background:#E8F5ED;border-left:4px solid #00853E;color:#00512A}
.alert-info{background:#E8F0FA;border-left:4px solid #0058A3;color:#00357A}

/* Table */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px}
thead th{background:#0058A3;color:#fff;padding:9px 10px;text-align:left;white-space:nowrap;font-weight:600;position:sticky;top:0}
thead th:first-child{border-radius:6px 0 0 0}
thead th:last-child{border-radius:0 6px 0 0}
tbody tr:nth-child(odd){background:#F9FAFB}
tbody tr:hover{background:#EDF3FB}
tbody td{padding:9px 10px;vertical-align:middle;border-bottom:1px solid #f0f0f0}
.artno{font-family:monospace;font-size:12px;font-weight:700;color:#0058A3}
.hfb-badge{background:#0058A3;color:#fff;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;margin:1px}
.tag-ssd{background:#FFF8E1;color:#7A5800}
.tag-eds{background:#FFF0F3;color:#7A0028}
.tag-rto{background:#E8F5ED;color:#00512A}
.tag-none{color:#bbb;font-size:12px}
.num{text-align:right;font-variant-numeric:tabular-nums}

/* Qty input */
.qty-cell{min-width:100px}
.qty-input{width:90px;padding:6px 8px;border:2px solid #ddd;border-radius:6px;font-size:13px;text-align:center;transition:border .2s}
.qty-input:focus{outline:none;border-color:#0058A3}

/* FC comparison cell */
.fc-cell{min-width:130px}
.fc-pending{color:#aaa;font-size:12px}
.fc-ok-label{color:#00853E;font-weight:700;font-size:13px}
.fc-warn-label{color:#E00751;font-weight:700;font-size:13px}
.fc-sub{font-size:11px;color:#888;margin-top:2px}

/* Submit form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:520px){.form-grid{grid-template-columns:1fr}}
.fg label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:4px}
.fg input,.fg textarea{width:100%;padding:9px 12px;border:2px solid #ddd;border-radius:7px;font-size:14px;transition:border .2s}
.fg input:focus,.fg textarea:focus{outline:none;border-color:#0058A3}
.fg.full{grid-column:1/-1}
.submit-items{background:#F9FAFB;border-radius:8px;padding:12px;font-size:13px;max-height:180px;overflow-y:auto;margin:8px 0}
.submit-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #eee}
.submit-item:last-child{border-bottom:none}
.si-artno{font-family:monospace;font-weight:700;color:#0058A3;width:90px;flex-shrink:0}
.si-name{flex:1;color:#555}
.si-qty{font-weight:700;color:#111;white-space:nowrap}
.si-warn{color:#E00751;font-size:11px}

/* Divider */
.divider{border:none;border-top:1px solid #eee;margin:16px 0}

/* QR section */
.qr-box{text-align:center;padding:12px 0}
#qrcode{display:inline-block;padding:12px;background:#fff;border:1px solid #ddd;border-radius:8px;margin-bottom:8px}
.qr-url{font-size:12px;color:#666;word-break:break-all;max-width:300px;margin:0 auto}

/* Not found row */
.row-notfound td{color:#E00751;font-style:italic}

/* Responsive */
@media(max-width:600px){
  .topbar h1{font-size:15px}
  .card{padding:14px}
  .btn{padding:9px 14px;font-size:13px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">IKEA</div>
  <div>
    <h1>IB 产品查询系统</h1>
    <small>Availability &amp; FC Enquiry for IKEA Business</small>
  </div>
</div>

<div class="status-bar">
  <div class="status-dot loading" id="sdot"></div>
  <span id="stext">数据加载中…</span>
</div>

<div class="page">

  <!-- 输入区 -->
  <div class="card">
    <div class="card-title">📦 输入货号</div>
    <div class="input-wrap">
      <textarea id="article-input" placeholder="输入货号，支持批量（每行一个）&#10;例如：&#10;00144937&#10;00157717&#10;00161644"></textarea>
      <div class="btn-col">
        <button class="btn btn-blue" onclick="doSearch()">🔍 查询</button>
        <button class="btn btn-green" id="scan-btn" onclick="toggleScanner()">📷 扫码</button>
        <button class="btn btn-yellow btn-sm" onclick="clearAll()">🗑 清除</button>
      </div>
    </div>
    <div id="scanner-wrap">
      <div id="reader"></div>
      <button class="btn btn-red btn-sm" style="margin-top:10px" onclick="stopScanner()">■ 停止扫码</button>
    </div>
  </div>

  <!-- 结果区 -->
  <div class="card" id="result-card" style="display:none">
    <div class="card-title">📊 产品信息</div>
    <div class="alert alert-info" id="fc-note"></div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>HFB</th>
            <th>货号</th>
            <th>中文名称</th>
            <th class="num">AWS<br><small style="font-weight:400;opacity:.8">周均销</small></th>
            <th class="num">EWS<br><small style="font-weight:400;opacity:.8">预期周销</small></th>
            <th class="num">LT<br><small style="font-weight:400;opacity:.8">周</small></th>
            <th class="num">在途总量</th>
            <th class="num">下次到货</th>
            <th>RTO</th>
            <th>SSD</th>
            <th>EDS</th>
            <th class="num">当月FC</th>
            <th>客户需求量</th>
            <th>FC对比</th>
          </tr>
        </thead>
        <tbody id="result-body"></tbody>
      </table>
    </div>

    <!-- 汇总警告 -->
    <div id="warn-box" style="margin-top:14px"></div>

    <hr class="divider">

    <!-- 提交需求 -->
    <div class="card-title">📬 提交采购需求至 FIS 团队</div>
    <div id="submit-items-preview" class="submit-items">
      <div style="color:#aaa;font-size:13px">填写下方货号需求数量后，此处将显示提交明细</div>
    </div>
    <div class="form-grid" style="margin-top:12px">
      <div class="fg">
        <label>客户公司名称 *</label>
        <input type="text" id="f-company" placeholder="公司名称">
      </div>
      <div class="fg">
        <label>联系人 *</label>
        <input type="text" id="f-contact" placeholder="姓名">
      </div>
      <div class="fg">
        <label>需求时间 *</label>
        <input type="date" id="f-reqdate">
      </div>
      <div class="fg">
        <label>联系电话</label>
        <input type="tel" id="f-phone" placeholder="手机号码">
      </div>
      <div class="fg">
        <label>电子邮件</label>
        <input type="email" id="f-email" placeholder="email@example.com">
      </div>
      <div class="fg full">
        <label>备注（如项目背景、配送要求等）</label>
        <textarea id="f-notes" rows="2" placeholder="可选"></textarea>
      </div>
    </div>
    <button class="btn btn-blue" style="margin-top:14px;width:100%;max-width:220px" onclick="submitRequest()">
      📤 提交至 FIS 团队
    </button>
    <div id="submit-confirm" style="margin-top:10px"></div>
  </div>

  <!-- 分享二维码 -->
  <div class="card">
    <div class="card-title">📱 分享此页面</div>
    <div class="qr-box">
      <div id="qrcode"></div>
      <div class="qr-url" id="qr-url-text"></div>
      <div style="font-size:12px;color:#888;margin-top:6px">微信扫码直接使用，无需安装</div>
    </div>
  </div>

</div><!-- /page -->

<script>
// ═══════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════
let DATA = null;  // { products:{}, fc_weekly:{}, updated:"" }
let RESULTS = []; // [{art, product, fcResult}]
let scanner = null;

// ═══════════════════════════════════════════════════════
// Load data
// ═══════════════════════════════════════════════════════
async function loadData() {
  setStatus('loading', '数据加载中…');
  try {
    const r = await fetch('ib-data.json?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    DATA = await r.json();
    const n = Object.keys(DATA.products || {}).length;
    const upd = DATA.updated || '未知';
    setStatus('ok', `数据已就绪 · ${n} 个产品 · 更新于 ${upd}`);
  } catch (e) {
    setStatus('err', '数据加载失败：' + e.message + '（请联系 IB 团队更新数据）');
    DATA = { products: {}, fc_weekly: {}, updated: '' };
  }
}

function setStatus(state, text) {
  document.getElementById('sdot').className = 'status-dot ' + state;
  document.getElementById('stext').textContent = text;
}

// ═══════════════════════════════════════════════════════
// ISO Week → Date utilities
// ═══════════════════════════════════════════════════════
function isoWeekMonday(year, week) {
  // Returns UTC Date of Monday for ISO week
  const jan4 = Date.UTC(year, 0, 4);
  const jan4dow = new Date(jan4).getUTCDay() || 7; // Mon=1..Sun=7
  const week1Mon = jan4 - (jan4dow - 1) * 86400000;
  return new Date(week1Mon + (week - 1) * 7 * 86400000);
}

function getMonthlyFC(artno, year, month) {
  if (!DATA || !DATA.fc_weekly) return null;
  const fc = DATA.fc_weekly[artno] || DATA.fc_weekly[artno.replace(/^0+/, '')];
  if (!fc) return null;
  let total = 0, count = 0;
  for (const [wk, val] of Object.entries(fc)) {
    if (wk.length !== 6) continue;
    const wy = parseInt(wk.slice(0, 4));
    const wn = parseInt(wk.slice(4, 6));
    const mon = isoWeekMonday(wy, wn);
    if (mon.getUTCFullYear() === year && mon.getUTCMonth() + 1 === month) {
      total += parseFloat(val) || 0;
      count++;
    }
  }
  return count > 0 ? { total: Math.round(total), weeks: count } : null;
}

function currentMonthFC(artno) {
  const d = new Date();
  return getMonthlyFC(artno, d.getFullYear(), d.getMonth() + 1);
}

// ═══════════════════════════════════════════════════════
// Scanner
// ═══════════════════════════════════════════════════════
function toggleScanner() {
  const wrap = document.getElementById('scanner-wrap');
  if (wrap.style.display === 'none' || !wrap.style.display) {
    wrap.style.display = 'block';
    startScanner();
  } else {
    stopScanner();
  }
}

function startScanner() {
  if (!scanner) scanner = new Html5Qrcode('reader');
  Html5Qrcode.getCameras().then(cams => {
    if (!cams.length) { alert('未找到摄像头'); return; }
    const cam = cams.find(c => /back|rear|后/i.test(c.label)) || cams[cams.length - 1];
    scanner.start(cam.id, { fps: 10, qrbox: { width: 260, height: 120 } },
      text => {
        const m = text.match(/\d{8}/);
        if (m) addArticle(m[0]);
      }, null
    ).catch(e => alert('摄像头启动失败：' + e));
  }).catch(e => alert('获取摄像头失败：' + e));
}

function stopScanner() {
  const wrap = document.getElementById('scanner-wrap');
  wrap.style.display = 'none';
  if (scanner) {
    scanner.stop().catch(() => {});
    scanner = null;
  }
  document.getElementById('scan-btn').textContent = '📷 扫码';
}

function addArticle(artno) {
  const ta = document.getElementById('article-input');
  const lines = ta.value.trim() ? ta.value.trim().split('\n').map(l => l.trim()) : [];
  if (!lines.includes(artno)) {
    ta.value = (ta.value.trim() ? ta.value.trim() + '\n' : '') + artno;
  }
  const btn = document.getElementById('scan-btn');
  btn.textContent = '✅ ' + artno;
  setTimeout(() => btn.textContent = '📷 扫码', 1800);
}

// ═══════════════════════════════════════════════════════
// Search
// ═══════════════════════════════════════════════════════
function parseInput(raw) {
  // Supports formats:
  //   "80415595"             → {art, qty:null}
  //   "80415595  5"          → {art, qty:5}    (space/tab separated, qty is small number)
  //   "80415595,5"           → {art, qty:5}
  //   "80415595\t5"          → {art, qty:5}
  const lines = raw.split(/\n/).map(l => l.trim()).filter(l => l);
  const seen = new Set();
  const items = [];
  for (const line of lines) {
    // Split by tab, comma, or 2+ spaces
    const parts = line.split(/\t|,|，|;|；|\s{2,}/).map(p => p.trim()).filter(p => p);
    if (!parts.length) continue;
    // First token must be a 7-10 digit number (article number)
    const artRaw = parts[0].replace(/\D/g, '');
    if (artRaw.length < 7 || artRaw.length > 10) continue;
    const art = artRaw.padStart(8, '0');
    if (!/^\d{8}$/.test(art) || seen.has(art)) continue;
    seen.add(art);
    // Second token (if present) = quantity — only if it's a plausible small number
    let qty = null;
    if (parts.length > 1) {
      const qv = parseFloat(parts[1].replace(/[^\d.]/g, ''));
      if (!isNaN(qv) && qv > 0 && qv < 1000000) qty = qv;
    }
    items.push({ art, qty });
  }
  return items;
}

function doSearch() {
  const raw = document.getElementById('article-input').value.trim();
  if (!raw) { alert('请输入货号'); return; }

  const items = parseInput(raw);
  if (!items.length) { alert('未识别到有效货号（7-10位数字）'); return; }

  stopScanner();

  const now = new Date();
  const MONTHS = ['一','二','三','四','五','六','七','八','九','十','十一','十二'];
  document.getElementById('fc-note').textContent =
    `📅 月度FC参考月份：${now.getFullYear()}年${MONTHS[now.getMonth()]}月（当月各周FC合计）`;

  const tbody = document.getElementById('result-body');
  tbody.innerHTML = '';
  RESULTS = [];

  items.forEach(({ art, qty: presetQty }) => {
    const prod = (DATA.products || {})[art] || (DATA.products || {})[art.replace(/^0+/, '')] || null;
    const fc = currentMonthFC(art);
    RESULTS.push({ art, prod, fc });

    const tr = document.createElement('tr');
    if (!prod) {
      tr.className = 'row-notfound';
      tr.innerHTML = `<td colspan="14" style="padding:10px 12px">
        ⚠️ 货号 <strong>${art}</strong> 未找到（请确认货号，或联系 IB 团队）</td>`;
    } else {
      const hfb = prod.hfb || art.slice(0, 2);
      const name = prod.name || '—';
      const aws = prod.aws != null ? Math.round(prod.aws * 10) / 10 : '—';
      const ews = prod.ews != null ? Math.round(prod.ews * 10) / 10 : '—';
      const lt = prod.lt != null ? prod.lt : '—';
      const inway = prod.in_transit != null ? prod.in_transit.toLocaleString() : '—';
      const nxdel = prod.next_delivery != null ? prod.next_delivery.toLocaleString() : '—';
      const nxdate = prod.next_delivery_date ? `<div style="font-size:11px;color:#888">${prod.next_delivery_date}</div>` : '';
      const rto = prod.rto ? `<span class="tag tag-rto">RTO: ${prod.rto}</span>` : `<span class="tag-none">—</span>`;
      const ssd = prod.ssd ? `<span class="tag tag-ssd">${prod.ssd}</span>` : `<span class="tag-none">—</span>`;
      const eds = prod.eds ? `<span class="tag tag-eds">${prod.eds}</span>` : `<span class="tag-none">—</span>`;
      const fcDisp = fc ? `<strong>${fc.total.toLocaleString()}</strong><div style="font-size:11px;color:#888">${fc.weeks}周合计</div>` : '<span class="tag-none">无数据</span>';

      tr.innerHTML = `
        <td><span class="hfb-badge">${hfb}</span></td>
        <td class="artno">${art}</td>
        <td>${name}</td>
        <td class="num">${aws}</td>
        <td class="num">${ews}</td>
        <td class="num">${lt}</td>
        <td class="num">${inway}</td>
        <td class="num">${nxdel}${nxdate}</td>
        <td>${rto}</td>
        <td>${ssd}</td>
        <td>${eds}</td>
        <td class="num">${fcDisp}</td>
        <td class="qty-cell">
          <input type="number" class="qty-input" min="0" placeholder="数量"
            data-art="${art}" data-fc="${fc ? fc.total : ''}"
            oninput="onQtyChange(this)">
        </td>
        <td class="fc-cell" id="fcc-${art}">
          <span class="fc-pending">填写数量后显示</span>
        </td>`;
    }
    tbody.appendChild(tr);

    // Pre-fill qty if provided in input
    if (presetQty != null) {
      const inp = tr.querySelector('.qty-input');
      if (inp) {
        inp.value = presetQty;
        onQtyChange(inp);
      }
    }
  });

  document.getElementById('result-card').style.display = 'block';
  document.getElementById('result-card').scrollIntoView({ behavior: 'smooth' });
  refreshSubmitPreview();
  refreshWarnBox();
}

// ═══════════════════════════════════════════════════════
// FC comparison
// ═══════════════════════════════════════════════════════
function onQtyChange(input) {
  const art = input.dataset.art;
  const fc = parseFloat(input.dataset.fc);
  const qty = parseFloat(input.value);
  const cell = document.getElementById('fcc-' + art);
  if (!cell) return;

  if (isNaN(qty) || qty <= 0) {
    cell.innerHTML = '<span class="fc-pending">填写数量后显示</span>';
  } else if (isNaN(fc) || fc <= 0) {
    cell.innerHTML = '<span class="fc-pending">无FC数据</span>';
  } else {
    const ratio = qty / fc;
    const pct = Math.round((ratio - 1) * 100);
    if (ratio > 1.1) {
      cell.innerHTML = `
        <div class="fc-warn-label">⚠️ 超FC +${pct}%</div>
        <div class="fc-sub">需求 ${qty.toLocaleString()} / FC ${fc.toLocaleString()}</div>
        <div style="font-size:11px;color:#E00751;margin-top:2px;font-weight:600">建议咨询 SO</div>`;
    } else if (ratio >= 0.9) {
      cell.innerHTML = `
        <div class="fc-ok-label">✅ 正常</div>
        <div class="fc-sub">需求 ${qty.toLocaleString()} / FC ${fc.toLocaleString()}</div>`;
    } else {
      cell.innerHTML = `
        <div style="color:#0058A3;font-weight:700">低于FC ${Math.round((1-ratio)*100)}%</div>
        <div class="fc-sub">需求 ${qty.toLocaleString()} / FC ${fc.toLocaleString()}</div>`;
    }
  }
  refreshWarnBox();
  refreshSubmitPreview();
}

function refreshWarnBox() {
  const warns = [];
  document.querySelectorAll('.qty-input').forEach(inp => {
    const qty = parseFloat(inp.value);
    const fc = parseFloat(inp.dataset.fc);
    if (isNaN(qty) || qty <= 0 || isNaN(fc) || fc <= 0) return;
    if (qty / fc > 1.1) {
      const art = inp.dataset.art;
      const res = RESULTS.find(r => r.art === art);
      const name = res && res.prod ? res.prod.name || art : art;
      const pct = Math.round((qty / fc - 1) * 100);
      warns.push(`货号 <strong>${art}</strong> ${name}：需求 ${qty.toLocaleString()} 件，超月度FC <strong>+${pct}%</strong>`);
    }
  });
  const box = document.getElementById('warn-box');
  if (warns.length) {
    box.innerHTML = `<div class="alert alert-warn">
      <div style="font-weight:700;margin-bottom:6px">⚠️ 以下货号需求超月度FC 10%，请联系 SO 确认供货能力：</div>
      <ul style="padding-left:18px">${warns.map(w => `<li style="margin:4px 0">${w}</li>`).join('')}</ul>
    </div>`;
  } else {
    box.innerHTML = '';
  }
}

function refreshSubmitPreview() {
  const preview = document.getElementById('submit-items-preview');
  const items = getSubmitItems();
  if (!items.length) {
    preview.innerHTML = '<div style="color:#aaa;font-size:13px">填写下方货号需求数量后，此处将显示提交明细</div>';
    return;
  }
  preview.innerHTML = items.map(it => {
    const warn = it.overFC ? `<span class="si-warn">超FC+${it.overFCPct}% ⚠️</span>` : '';
    return `<div class="submit-item">
      <span class="si-artno">${it.art}</span>
      <span class="si-name">${it.name}</span>
      <span class="si-qty">${it.qty.toLocaleString()} 件</span>
      ${warn}
    </div>`;
  }).join('');
}

function getSubmitItems() {
  const items = [];
  document.querySelectorAll('.qty-input').forEach(inp => {
    const qty = parseFloat(inp.value);
    if (isNaN(qty) || qty <= 0) return;
    const art = inp.dataset.art;
    const fc = parseFloat(inp.dataset.fc);
    const res = RESULTS.find(r => r.art === art);
    const name = res && res.prod ? res.prod.name || '' : '';
    const overFC = !isNaN(fc) && fc > 0 && qty / fc > 1.1;
    const overFCPct = overFC ? Math.round((qty / fc - 1) * 100) : 0;
    items.push({ art, name, qty, overFC, overFCPct, fc });
  });
  return items;
}

// ═══════════════════════════════════════════════════════
// Submit
// ═══════════════════════════════════════════════════════
function submitRequest() {
  const company = document.getElementById('f-company').value.trim();
  const contact = document.getElementById('f-contact').value.trim();
  const reqdate = document.getElementById('f-reqdate').value.trim();
  if (!company || !contact) { alert('请填写客户公司名称和联系人'); return; }
  if (!reqdate) { alert('请填写需求时间'); return; }

  const items = getSubmitItems();
  if (!items.length) { alert('请至少为一个货号填写需求数量'); return; }

  const now = new Date();
  const dateStr = now.toLocaleString('zh-CN', { hour12: false });
  const phone = document.getElementById('f-phone').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const notes = document.getElementById('f-notes').value.trim();

  // Format reqdate as YYYY-MM-DD → 中文
  const rd = new Date(reqdate + 'T00:00:00');
  const reqdateCN = `${rd.getFullYear()}年${rd.getMonth()+1}月${rd.getDate()}日`;

  const lines = [
    `【IB 采购需求 - FIS团队】${dateStr}`,
    `客户公司：${company}`,
    `联系人：${contact}`,
    `需求时间：${reqdateCN}`,
    phone ? `联系电话：${phone}` : '',
    email ? `电子邮件：${email}` : '',
    '',
    '需求明细：',
    ...items.map(it => {
      const fcInfo = it.fc > 0 ? `当月FC: ${it.fc.toLocaleString()}` : '无FC数据';
      const warn = it.overFC ? ` ⚠️ 超FC+${it.overFCPct}%，需咨询SO` : '';
      return `  ${it.art}  ${it.name}  需求: ${it.qty.toLocaleString()} 件  （${fcInfo}${warn}）`;
    }),
    notes ? `\n备注：${notes}` : '',
  ].filter(l => l !== undefined && l !== null);

  const body = lines.join('\n').replace(/\n\n+/g, '\n\n');
  const subject = `IB采购需求 - ${company} - 需求时间${reqdateCN}`;

  const mailto = `mailto:hattie.wang@ingka.ikea.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.location.href = mailto;

  document.getElementById('submit-confirm').innerHTML = `
    <div class="alert alert-ok">
      ✅ 邮件已准备好，请在邮件客户端中确认发送。<br>
      如未自动打开，请将需求明细发送至：<strong>hattie.wang@ingka.ikea.com</strong>
    </div>`;
}

// ═══════════════════════════════════════════════════════
// Clear
// ═══════════════════════════════════════════════════════
function clearAll() {
  document.getElementById('article-input').value = '';
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('result-body').innerHTML = '';
  document.getElementById('warn-box').innerHTML = '';
  document.getElementById('submit-confirm').innerHTML = '';
  RESULTS = [];
  stopScanner();
}

// ═══════════════════════════════════════════════════════
// QR Code
// ═══════════════════════════════════════════════════════
function initQR() {
  const url = window.location.href.split('?')[0].split('#')[0];
  document.getElementById('qr-url-text').textContent = url;
  new QRCode(document.getElementById('qrcode'), {
    text: url,
    width: 180,
    height: 180,
    colorDark: '#0058A3',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
}

// ═══════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════
loadData();
initQR();
</script>
